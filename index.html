<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مایع طلایی اکلیلی</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000; /* رنگ پس زمینه در صورت عدم پوشش کامل کانواس */
            cursor: pointer;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="liquidCanvas"></canvas>

    <script>
        const canvas = document.getElementById('liquidCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // تنظیمات مایع و اکلیل
        const liquidColor = 'rgba(218, 165, 32, 0.1)'; // رنگ طلایی پایه با شفافیت کم برای لایه‌بندی
        const rippleConfig = {
            maxRipples: 10,
            baseRadius: 15,
            spreadSpeed: 3, // سرعت گسترش موج - کمتر برای حس غلظت بیشتر
            lineWidthStart: 15, // ضخامت اولیه خط موج
            lineWidthEnd: 1,
            fadeOutSpeed: 0.01, // سرعت محو شدن موج
            color: 'rgba(255, 215, 0, 0.7)', // رنگ موج - طلایی روشن‌تر
        };

        const glitterConfig = {
            count: 300, // تعداد ذرات اکلیل
            minSize: 0.5,
            maxSize: 2,
            minSpeed: 0.1,
            maxSpeed: 0.5,
            colors: ['#FFD700', '#FAFAD2', '#EEE8AA', '#F0E68C', '#BDB76B'] // طیف رنگی اکلیل
        };

        let ripples = [];
        let glitterParticles = [];

        // ایجاد ذرات اکلیل
        function initGlitter() {
            glitterParticles = [];
            for (let i = 0; i < glitterConfig.count; i++) {
                glitterParticles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * (glitterConfig.maxSize - glitterConfig.minSize) + glitterConfig.minSize,
                    color: glitterConfig.colors[Math.floor(Math.random() * glitterConfig.colors.length)],
                    vx: (Math.random() - 0.5) * glitterConfig.maxSpeed,
                    vy: (Math.random() - 0.5) * glitterConfig.maxSpeed,
                    opacity: Math.random() * 0.5 + 0.5 // شفافیت متغیر برای درخشش
                });
            }
        }

        // ایجاد موج جدید
        function createRipple(x, y) {
            if (ripples.length < rippleConfig.maxRipples) {
                ripples.push({
                    x: x,
                    y: y,
                    currentRadius: rippleConfig.baseRadius,
                    opacity: 1,
                    lineWidth: rippleConfig.lineWidthStart
                });
            }
        }

        // به‌روزرسانی و رسم امواج
        function updateAndDrawRipples() {
            for (let i = ripples.length - 1; i >= 0; i--) {
                let ripple = ripples[i];
                ripple.currentRadius += rippleConfig.spreadSpeed;
                ripple.opacity -= rippleConfig.fadeOutSpeed;
                ripple.lineWidth = Math.max(rippleConfig.lineWidthEnd, ripple.lineWidth - 0.15); // کاهش تدریجی ضخامت

                if (ripple.opacity <= 0) {
                    ripples.splice(i, 1);
                    continue;
                }

                ctx.beginPath();
                ctx.arc(ripple.x, ripple.y, ripple.currentRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${hexToRgb(rippleConfig.color).r}, ${hexToRgb(rippleConfig.color).g}, ${hexToRgb(rippleConfig.color).b}, ${ripple.opacity})`;
                ctx.lineWidth = ripple.lineWidth;
                ctx.stroke();
            }
        }
        
        // تابع کمکی تبدیل هگز به RGB برای استفاده از شفافیت
        function hexToRgb(hex) {
            let r = 0, g = 0, b = 0;
            if (hex.length == 4) { // #RGB
                r = "0x" + hex[1] + hex[1];
                g = "0x" + hex[2] + hex[2];
                b = "0x" + hex[3] + hex[3];
            } else if (hex.length == 7) { // #RRGGBB
                r = "0x" + hex[1] + hex[2];
                g = "0x" + hex[3] + hex[4];
                b = "0x" + hex[5] + hex[6];
            }
            return { r: +r, g: +g, b: +b };
        }


        // به‌روزرسانی و رسم اکلیل
        function updateAndDrawGlitter() {
            glitterParticles.forEach(p => {
                // حرکت آرام ذرات
                p.x += p.vx;
                p.y += p.vy;

                // بازگرداندن ذرات به داخل صفحه
                if (p.x > width + p.size) p.x = -p.size;
                if (p.x < -p.size) p.x = width + p.size;
                if (p.y > height + p.size) p.y = -p.size;
                if (p.y < -p.size) p.y = height + p.size;

                // ایجاد حالت چشمک‌زن با تغییر شفافیت
                if (Math.random() > 0.98) {
                     p.opacity = Math.random() * 0.5 + 0.5;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color.startsWith('rgba') ? p.color : `rgba(${hexToRgb(p.color).r}, ${hexToRgb(p.color).g}, ${hexToRgb(p.color).b}, ${p.opacity})`;
                ctx.fill();
            });
        }


        // حلقه انیمیشن اصلی
        function animate() {
            // رسم پس‌زمینه مایع پایه (لایه‌ای و شفاف برای ایجاد عمق)
            ctx.fillStyle = liquidColor;
            ctx.fillRect(0, 0, width, height);
            
            // اضافه کردن یک لایه تیره‌تر از طلایی برای حس بیشتر مایع بودن
            ctx.fillStyle = 'rgba(139, 101, 8, 0.02)'; // قهوه‌ای طلایی خیلی شفاف
            ctx.fillRect(0,0,width,height);


            updateAndDrawGlitter();
            updateAndDrawRipples();

            requestAnimationFrame(animate);
        }

        // Event Listeners
        canvas.addEventListener('click', (event) => {
            createRipple(event.clientX, event.clientY);
        });
        canvas.addEventListener('touchstart', (event) => {
            event.preventDefault(); // جلوگیری از رفتارهای پیش‌فرض لمس مانند اسکرول
            for(let i=0; i< event.touches.length; i++){
                 createRipple(event.touches[i].clientX, event.touches[i].clientY);
            }
        }, { passive: false });


        // شروع
        initGlitter();
        animate();

    </script>
</body>
</html>
