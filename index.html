<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعت دیجیتال ریسپانسیو با افکت فلیپ</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            direction: ltr;
        }
        .clock {
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }
        .digit {
            display: inline-block;
            position: relative;
            width: 1.2em;
            height: 1.5em;
            overflow: hidden;
        }
        .digit span {
            position: absolute;
            width: 100%;
            text-align: center;
            transition: transform 0.5s ease-in-out;
        }
        .digit span.next {
            transform: translateY(-100%);
        }
        .digit span.current {
            transform: translateY(0);
        }
        .colon {
            display: inline-block;
            width: 0.5em;
            text-align: center;
        }
        /* افقی (landscape) */
        @media screen and (orientation: landscape) {
            .clock {
                flex-direction: row;
                font-size: 12vw;
            }
            .section {
                display: flex;
                align-items: center;
            }
            .colon {
                font-size: 12vw;
                line-height: 1.5em;
            }
        }
        /* عمودی (portrait) */
        @media screen and (orientation: portrait) {
            .clock {
                flex-direction: column;
                font-size: 15vw;
            }
            .section {
                display: flex;
                align-items: center;
                margin: 1vh 0;
            }
            .colon {
                font-size: 15vw;
                line-height: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="section" id="hours">
            <div class="digit" id="hour1"><span class="current">0</span><span class="next"></span></div>
            <div class="digit" id="hour2"><span class="current">0</span><span class="next"></span></div>
        </div>
        <div class="colon">:</div>
        <div class="section" id="minutes">
            <div class="digit" id="minute1"><span class="current">0</span><span class="next"></span></div>
            <div class="digit" id="minute2"><span class="current">0</span><span class="next"></span></div>
        </div>
        <div class="colon">:</div>
        <div class="section" id="seconds">
            <div class="digit" id="second1"><span class="current">0</span><span class="next"></span></div>
            <div class="digit" id="second2"><span class="current">0</span><span class="next"></span></div>
        </div>
    </div>
    <script>
        function updateClock() {
            const now = new Date().toLocaleTimeString('en-US', { 
                timeZone: 'Asia/Tehran', 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            const [hours, minutes, seconds] = now.split(':');
            
            updateDigit('hour1', hours[0]);
            updateDigit('hour2', hours[1]);
            updateDigit('minute1', minutes[0]);
            updateDigit('minute2', minutes[1]);
            updateDigit('second1', seconds[0]);
            updateDigit('second2', seconds[1]);
        }

        function updateDigit(id, newValue) {
            const digit = document.getElementById(id);
            const current = digit.querySelector('.current');
            const next = digit.querySelector('.next');
            
            if (current.textContent !== newValue) {
                next.textContent = newValue;
                next.classList.add('current');
                current.classList.remove('current');
                current.classList.add('next');
                
                setTimeout(() => {
                    current.textContent = newValue;
                    current.classList.add('current');
                    current.classList.remove('next');
                    next.classList.remove('current');
                }, 500);
            }
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
