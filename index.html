<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>بررسی حساب‌های خالی سولانا</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; text-align: center; direction: rtl; }
    input, button { padding: 0.5rem; font-size: 1rem; margin-top: 1rem; width: 100%; }
    .result { margin-top: 2rem; font-weight: bold; }
  </style>
</head>
<body>

  <h1>بررسی حساب‌های خالی سولانا</h1>
  <input id="wallet" placeholder="آدرس کیف پول سولانا را وارد کنید" />
  <button onclick="checkAccounts()">بررسی</button>

  <div class="result" id="result"></div>

  <script>
    const RPC_URL = "https://api.mainnet-beta.solana.com";

    async function getTokenAccounts(address) {
      const body = {
        jsonrpc: "2.0",
        id: 1,
        method: "getTokenAccountsByOwner",
        params: [
          address,
          { programId: "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA" },
          { encoding: "jsonParsed" }
        ]
      };
      const res = await fetch(RPC_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      return data.result.value;
    }

    async function getLamports(pubkey) {
      const body = {
        jsonrpc: "2.0",
        id: 1,
        method: "getAccountInfo",
        params: [pubkey, { encoding: "base64" }]
      };
      const res = await fetch(RPC_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      return data.result?.value?.lamports || 0;
    }

    async function checkAccounts() {
      const address = document.getElementById("wallet").value.trim();
      if (!address) return alert("آدرس وارد نشده");

      document.getElementById("result").textContent = "⏳ در حال بررسی...";

      try {
        const accounts = await getTokenAccounts(address);
        let emptyCount = 0;
        let totalLamports = 0;

        for (const acc of accounts) {
          const amount = parseInt(acc.account.data.parsed.info.tokenAmount.amount);
          if (amount === 0) {
            emptyCount++;
            const lamports = await getLamports(acc.pubkey);
            totalLamports += lamports;
          }
        }

        const sol = totalLamports / 1_000_000_000;
        document.getElementById("result").innerHTML = `
          🔢 تعداد کل Token Accounts: ${accounts.length}<br>
          🧹 قابل حذف (خالی): ${emptyCount}<br>
          💰 قابل بازیابی: ${sol.toFixed(6)} SOL
        `;
      } catch (err) {
        document.getElementById("result").textContent = "❌ خطا در دریافت اطلاعات";
        console.error(err);
      }
    }
  </script>

</body>
</html>
